<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - MUCILAGE</title>
  <meta name="description" content="Get in touch with Mucilage.">
  <link rel="stylesheet" href="css/styles.css?v=20260520">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="back-btn">
        ← <span>Back</span>
      </a>
      <h1 class="site-title">MUCILAGE</h1>
    </div>
  </header>

  <main>
    <div class="contact-content">
      <h2>Contact</h2>

      <p class="contact-intro">
        Got questions, feedback, or just want to share how a module went at your table? Drop a line below.
      </p>

      <form class="contact-form" id="form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <script>
        const form = document.getElementById('form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
          e.preventDefault();

          const formData = new FormData(form);
          formData.append("access_key", "c6b5a673-87df-4de8-8267-ca4b2e579831");

          const originalText = submitBtn.textContent;
          submitBtn.textContent = "Sending...";
          submitBtn.disabled = true;

          try {
            const response = await fetch("https://api.web3forms.com/submit", {
              method: "POST",
              body: formData
            });

            const data = await response.json();

            if (response.ok) {
              alert("Success! Your message has been sent.");
              form.reset();
            } else {
              alert("Error: " + data.message);
            }
          } catch (error) {
            alert("Something went wrong. Please try again.");
          } finally {
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        });
      </script>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-links">
        <a href="https://mucilage.itch.io" class="footer-link" target="_blank" rel="noopener noreferrer">
          <div class="footer-icon">i</div>
          Itch.io
        </a>
        <a href="mailto:joseph@mucilage.net" class="footer-link">
          <div class="footer-icon">@</div>
          joseph@mucilage.net
        </a>
      </div>
      <div class="footer-copyright">
        © 2025 Mucilage
      </div>
    </div>
  </footer>
</body>
</html>
