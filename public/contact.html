<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - MUCILAGE</title>
  <meta name="description" content="Get in touch with Mucilage.">
  <link rel="stylesheet" href="css/styles.css?v=20260520">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="back-btn">
        ← <span>Back</span>
      </a>
      <h1 class="site-title">MUCILAGE</h1>
    </div>
  </header>

  <main>
    <div class="contact-content">
      <h2>Contact</h2>

      <p class="contact-intro">
        Got questions, feedback, or just want to share how a module went at your table? Drop a line below.
      </p>

      <form class="contact-form" id="contactForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
          e.preventDefault();
          var name = document.getElementById('name').value;
          var email = document.getElementById('email').value;
          var message = document.getElementById('message').value;
          var body = 'From: ' + name + ' (' + email + ')\n\n' + message;
          window.location.href = 'mailto:joseph@mucilage.net'
            + '?subject=' + encodeURIComponent('Message from ' + name)
            + '&body=' + encodeURIComponent(body);
        });
      </script>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-links">
        <a href="https://mucilage.itch.io" class="footer-link" target="_blank" rel="noopener noreferrer">
          <div class="footer-icon">i</div>
          Itch.io
        </a>
        <a href="mailto:joseph@mucilage.net" class="footer-link">
          <div class="footer-icon">@</div>
          joseph@mucilage.net
        </a>
      </div>
      <div class="footer-copyright">
        © 2025 Mucilage
      </div>
    </div>
  </footer>
</body>
</html>
